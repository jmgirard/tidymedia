url: https://jmgirard.github.io/tidymedia/

template:
  bootstrap: 5

reference:
- title: "Layer 0: escape hatches"
  desc: >
    Pass a raw argument string straight to the command-line tools. Use these
    when you need something tidymedia does not wrap.
  contents:
  - ffmpeg
  - ffprobe
  - mediainfo
- title: "Layer 1: the pipeline builder"
  desc: >
    Assemble a reproducible FFmpeg command step by step, then compile or run it.
  contents:
  - ffm
  - ffm_files
  - ffm_trim
  - ffm_seek
  - ffm_drop
  - ffm_crop
  - ffm_scale
  - ffm_fps
  - ffm_codec
  - ffm_map
  - ffm_copy
  - ffm_pixel_format
  - ffm_hstack
  - ffm_vstack
  - ffm_overlay
  - ffm_concat
  - ffm_drawbox
  - ffm_loudnorm
  - ffm_output_options
  - ffm_compile
  - ffm_run
  - ffm_batch
  - print.tidymedia_ffm
- title: "Layer 2: task verbs"
  desc: >
    Thin wrappers over the builder for common preprocessing jobs.
  contents:
  - extract_frame
  - extract_frame_batch
  - sample_frames
  - sample_frames_batch
  - extract_audio
  - extract_audio_batch
  - separate_audio_video
  - separate_audio_video_batch
  - convert_audio
  - convert_audio_batch
  - normalize_audio
  - normalize_audio_batch
  - crop_video
  - crop_video_batch
  - anonymize_video
  - anonymize_video_batch
  - strip_metadata
  - strip_metadata_batch
  - format_for_web
  - format_for_web_batch
  - standardize_video
  - standardize_video_batch
  - segment_video
  - segment_video_batch
  - concatenate_videos
  - compare_videos
  - picture_in_picture
- title: "Verification & provenance"
  desc: >
    Check that an output really has the properties you asked for, and record a
    reproducibility manifest for a batch run.
  contents:
  - verify_media
  - ffm_manifest
- title: "Media metadata"
  desc: >
    Read container and stream metadata as tibbles, ready for the tidyverse.
  contents:
  - probe_all
  - probe_container
  - mediainfo_parameter
  - mediainfo_query
  - mediainfo_template
  - mediainfo_summary
  - get_duration
  - get_frame_rate
  - get_width
  - get_height
  - get_sample_rate
- title: "FFmpeg capabilities"
  desc: >
    Discover the codecs and encoders available in your FFmpeg build.
  contents:
  - ffmpeg_codecs
  - ffmpeg_encoders
- title: "Program management"
  desc: >
    Locate, configure, and install the FFmpeg and MediaInfo binaries.
  contents:
  - find_ffmpeg
  - set_ffmpeg
  - install_on_win

articles:
- title: Articles
  navbar: ~
  contents:
  - metadata
  - batch
